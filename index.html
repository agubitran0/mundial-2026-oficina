<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mundial 2026 · Apuestas de Oficina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d1a;--s1:#0d1829;--s2:#111f35;--s3:#162540;
  --gold:#f0b429;--green:#10b981;--red:#ef4444;--blue:#3b82f6;
  --text:#eef2ff;--muted:#6b85aa;--border:#1e3050;
  --ph0:#f0b429;--ph1:#e85d04;--ph2:#7c3aed;--ph3:#0ea5e9;--ph4:#10b981;--ph5:#ec4899;--ph6:#f43f5e;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden }
button,input{font-family:'Outfit',sans-serif}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}


/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem}
#loader .trophy{font-size:4rem;animation:float 2s ease-in-out infinite}
#loader p{color:var(--muted);font-size:.9rem}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hidden{display:none!important}

/* ── TOAST ── */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:.55rem 1.25rem;border-radius:20px;font-weight:600;font-size:.88rem;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:.05em;color:var(--gold)}
.nav-logo span{color:var(--text);font-size:.85rem;margin-left:.35rem;font-family:'Outfit',sans-serif;font-weight:300}
.nav-tabs{display:flex;gap:.2rem}
.ntab{background:none;border:none;color:var(--muted);padding:.4rem .65rem;border-radius:8px;font-size:.8rem;font-weight:500;transition:all .15s;cursor:pointer}
.ntab.active,.ntab:hover{background:var(--s3);color:var(--text)}
.ntab.active{color:var(--gold)}

/* ── HOME ── */
.home{min-height:calc(100vh - 53px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0d2545 0%,var(--bg) 70%)}
.home-hero{text-align:center;margin-bottom:2rem}
.trophy-wrap{font-size:4.5rem;margin-bottom:.25rem;display:inline-block;animation:float 4s ease-in-out infinite}
.home h1{font-family:'Bebas Neue',cursive;font-size:clamp(3.5rem,11vw,6.5rem);line-height:.9;letter-spacing:.03em}
.home h1 .year{color:var(--gold);display:block}
.home-sub{color:var(--muted);font-size:.82rem;letter-spacing:.15em;text-transform:uppercase;margin-top:.6rem}
.pot-display{background:linear-gradient(135deg,#0d1f0d,#0a1f0a);border:1px solid #1a4a1a;border-radius:16px;padding:1rem 1.75rem;text-align:center;margin-bottom:1.75rem;min-width:220px}
.pot-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:#4ade80;margin-bottom:.2rem}
.pot-amount{font-family:'Bebas Neue',cursive;font-size:2.8rem;color:#4ade80;line-height:1}
.pot-sub{font-size:.72rem;color:var(--muted);margin-top:.2rem}
.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;width:100%;max-width:400px;margin-bottom:1.75rem}
.home-actions .full{grid-column:1/-1}
.hbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.25rem;padding:1rem;border:none;border-radius:14px;font-size:.95rem;font-weight:600;transition:transform .15s,box-shadow .15s;cursor:pointer}
.hbtn:hover{transform:translateY(-2px)}
.hbtn .ico{font-size:1.5rem}
.hbtn.gold{background:var(--gold);color:#111;box-shadow:0 8px 24px rgba(240,180,41,.25)}
.hbtn.dark{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.hbtn.admin{background:var(--s1);color:var(--muted);border:1px solid var(--border);font-size:.82rem}
.stats-strip{display:flex;gap:2rem}
.sstat{text-align:center}
.sstat .val{font-family:'Bebas Neue',cursive;font-size:1.7rem;color:var(--gold);display:block}
.sstat .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* ── PHASE NAV ── */
.phase-nav{display:flex;gap:.35rem;padding:.65rem .85rem;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--s1)}
.phase-nav::-webkit-scrollbar{height:3px}
.phase-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ptab{display:flex;flex-direction:column;align-items:center;gap:.1rem;background:none;border:1px solid var(--border);border-radius:10px;padding:.35rem .6rem;color:var(--muted);font-size:.72rem;font-weight:500;min-width:66px;transition:all .15s;cursor:pointer}
.ptab .pico{font-size:.95rem}
.ptab.active{border-color:var(--pc);color:var(--pc);background:color-mix(in srgb,var(--pc) 12%,transparent)}
.ptab.locked{opacity:.35;cursor:default}
.ptab[data-ph="0"]{--pc:var(--ph0)}.ptab[data-ph="1"]{--pc:var(--ph1)}.ptab[data-ph="2"]{--pc:var(--ph2)}
.ptab[data-ph="3"]{--pc:var(--ph3)}.ptab[data-ph="4"]{--pc:var(--ph4)}.ptab[data-ph="5"]{--pc:var(--ph5)}.ptab[data-ph="6"]{--pc:var(--ph6)}

/* ── MATCHES ── */
.view-wrap{max-width:700px;margin:0 auto;padding:1rem}
.phase-header{display:flex;align-items:center;gap:.65rem;margin-bottom:1rem;padding:.65rem .9rem;background:var(--s1);border-radius:12px;border-left:4px solid var(--phc,var(--gold))}
.phase-header h2{font-family:'Bebas Neue',cursive;font-size:1.4rem}
.phase-mult{background:color-mix(in srgb,var(--phc,var(--gold)) 20%,transparent);color:var(--phc,var(--gold));border-radius:6px;padding:.12rem .45rem;font-size:.72rem;font-weight:600;margin-left:auto}
.locked-msg{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.locked-msg .lock-ico{font-size:2.5rem;margin-bottom:.6rem}
.group-tabs{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.9rem}
.gtab{background:var(--s2);border:1px solid var(--border);color:var(--muted);padding:.28rem .55rem;border-radius:6px;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s}
.gtab.active{background:var(--gold);color:#111;border-color:var(--gold);font-weight:700}
.match-card{background:var(--s1);border:1px solid var(--border);border-radius:13px;padding:.85rem .95rem;margin-bottom:.55rem;transition:border-color .2s}
.match-card.bet-ok{border-color:#1e3a1e}
.match-card.has-res{border-color:#1a3a1a}
.match-meta{font-size:.68rem;color:var(--muted);margin-bottom:.45rem;display:flex;gap:.65rem;flex-wrap:wrap}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.45rem;margin-bottom:.5rem}
.team{display:flex;align-items:center;gap:.35rem;font-size:.85rem;font-weight:500}
.team.right{justify-content:flex-end;flex-direction:row-reverse}
.flag{font-size:1.2rem}
.score-box{display:flex;align-items:center;gap:.35rem}
.score-box input{width:46px;background:var(--s3);border:1px solid var(--border);color:var(--text);text-align:center;padding:.38rem;border-radius:8px;font-size:.95rem;font-weight:600;transition:border-color .2s}
.score-box input:focus{outline:none;border-color:var(--gold)}
.score-box input:disabled{opacity:.45}
.score-sep{color:var(--muted);font-weight:700;font-size:.85rem}
.bet-row{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;margin-top:.3rem}
.result-pill{background:#0d2d0d;color:var(--green);border-radius:20px;padding:.18rem .55rem;font-size:.72rem;font-weight:600;margin-left:auto}
.pts-pill{background:#1a1a3a;color:#818cf8;border-radius:20px;padding:.18rem .55rem;font-size:.72rem;font-weight:600}
.save-btn-float{position:sticky;bottom:1rem;margin-top:1rem}
.save-btn{width:100%;background:var(--gold);color:#111;border:none;border-radius:12px;padding:.85rem;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .15s;box-shadow:0 4px 20px rgba(240,180,41,.3)}
.save-btn:hover{opacity:.9}
.save-btn-sm{background:var(--green);color:#fff;border:none;border-radius:8px;padding:.32rem .75rem;font-size:.78rem;font-weight:600;cursor:pointer;margin-left:auto}

/* ── RANKING ── */
.prize-banner{background:linear-gradient(135deg,#0d1f0d,#0a1f0a);border:1px solid #1a4a1a;border-radius:16px;padding:1.1rem;text-align:center;margin-bottom:1.1rem}
.prize-banner .ico{font-size:2rem;margin-bottom:.2rem}
.prize-banner h3{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--green)}
.prize-banner .amount{font-family:'Bebas Neue',cursive;font-size:3rem;color:#4ade80;line-height:1}
.rank-row{display:flex;align-items:center;gap:.65rem;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:.8rem .95rem;margin-bottom:.45rem}
.rank-row.gold-row{border-color:#3a2a00;background:linear-gradient(90deg,#120e00,var(--s1))}
.rank-pos{font-size:1.3rem;width:2rem;text-align:center;flex-shrink:0}
.rank-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-info strong{display:block;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-info .rank-sub{color:var(--muted);font-size:.72rem}
.rank-pts{font-family:'Bebas Neue',cursive;font-size:1.45rem;color:var(--gold)}
.legend{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.9rem;padding:.65rem;background:var(--s1);border-radius:10px}
.leg-item{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:.3rem}

/* ── LOGIN ── */
.player-btn{display:flex;align-items:center;gap:.85rem;width:100%;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:.85rem .95rem;color:var(--text);text-align:left;margin-bottom:.45rem;cursor:pointer;transition:border-color .15s}
.player-btn:hover{border-color:var(--gold)}
.p-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
.p-info{flex:1}
.p-info strong{display:block;font-size:.9rem}
.p-info small{color:var(--muted);font-size:.75rem}

/* ── ADMIN ── */
.admin-pw-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:.9rem}
.admin-section{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:1.15rem;margin-bottom:.9rem}
.admin-section h3{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--gold);margin-bottom:.9rem}
.inp{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:.65rem .85rem;border-radius:10px;font-size:.9rem;margin-bottom:.55rem}
.inp:focus{outline:none;border-color:var(--gold)}
.row{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap}
.btn-g{background:var(--gold);color:#111;border:none;border-radius:10px;padding:.6rem 1.1rem;font-weight:700;font-size:.85rem;cursor:pointer}
.btn-d{background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:.6rem 1.1rem;font-weight:600;font-size:.85rem;cursor:pointer}
.btn-sm{padding:.3rem .7rem;font-size:.78rem;border-radius:8px}
.chip{display:inline-flex;align-items:center;gap:.35rem;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:.22rem .7rem;font-size:.8rem;margin:.18rem}
.chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;line-height:1}
.unlock-card{display:flex;align-items:center;gap:.65rem;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;margin-bottom:.45rem}
.unlock-card .uc-info{flex:1}
.unlock-card strong{display:block;font-size:.88rem}
.unlock-card small{color:var(--muted);font-size:.72rem}
.badge{display:inline-block;border-radius:6px;padding:.12rem .45rem;font-size:.7rem;font-weight:600}
.badge.open{background:#0d2d0d;color:var(--green)}
.badge.locked{background:#2a1a00;color:#fb923c}
.btn-warn{background:#2a1a3a;color:#a78bfa;border:1px solid #4c1d95;border-radius:6px;padding:.3rem .7rem;font-size:.8rem;cursor:pointer}
.btn-warn:hover{background:#3b1f6e}
.hint{color:var(--muted);font-size:.8rem;margin-bottom:.65rem;line-height:1.5}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.38rem .85rem;border-radius:8px;font-size:.82rem;cursor:pointer;margin-bottom:.85rem}
.predict-header{display:flex;align-items:center;gap:.85rem;padding:.65rem .85rem;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:50}
.predict-header h2{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--gold)}
.budget-chip{background:var(--s2);border:1px solid #1a4a1a;color:var(--green);border-radius:20px;padding:.18rem .65rem;font-size:.78rem}
.empty{text-align:center;color:var(--muted);padding:2rem;font-size:.88rem}
</style>
</head>

function findMid(homeEs, awayEs) {
  for (const [mid, m] of Object.entries(ALL_MATCHES_MAP)) {
    if (m.home === homeEs && m.away === awayEs) return { mid, swapped: false };
    if (m.home === awayEs && m.away === homeEs) return { mid, swapped: true };

function getGoals90(fix) {
  const ft = fix.score.fulltime;
  return { home: ft.home ?? 0, away: ft.away ?? 0 };
}

function wentToExtras(fix) {
  const s = fix.fixture.status.short;
  return s === "PEN" || s === "AET";
}

  const etH = fix.score.extratime?.home ?? 0;
  const etA = fix.score.extratime?.away ?? 0;
  const th  = (ft.home ?? 0) + etH, ta = (ft.away ?? 0) + etA;
  return th > ta ? homeEs : ta > th ? awayEs : null;
}

async function syncResults() {
  const btn = document.querySelector("#btn-sync");
  if (btn) { btn.disabled = true; btn.textContent = "⏳ Sincronizando..."; }
  try {
    const res  = await fetch("/.netlify/functions/sync");
    const data = await res.json();
    if (data.error) { toast("❌ Error: " + data.error, false); return; }

    // openfootball format: { rounds: [ { matches: [ { team1, team2, score, group } ] } ] }
    const rounds = data.rounds || [];
    const patch  = {};
    let count    = 0;

    for (const round of rounds) {
      for (const match of (round.matches || [])) {
        // Solo partidos con resultado
        if (!match.score || !match.score.ft) continue;

        const homeEs = apiTeamName(match.team1?.name || "");
        const awayEs = apiTeamName(match.team2?.name || "");
        if (!homeEs || !awayEs) continue;

        const found = findMid(homeEs, awayEs);
        if (!found) continue;

        const { mid, swapped } = found;
        const ft = match.score.ft; // [golesLocal, golesVisitante]
        const h  = swapped ? ft[1] : ft[0];
        const a  = swapped ? ft[0] : ft[1];
        const ph = getMatchPhase(mid);

        if (ph === 0) {
          // Grupos: solo goles
          patch[`results/${mid}`] = { home: h, away: a, qualified: null };
        } else {
          // Eliminatorias: detectar prórroga/penales
          // openfootball incluye score.et (extratime) y score.p (penales)
          const hasPen = !!(match.score.p);
          const hasET  = !!(match.score.et);
          const extras = hasPen || hasET;

          let qualified = null;
          if (hasPen) {
            const pen = match.score.p;
            const ph_ = swapped ? pen[1] : pen[0];
            const pa_ = swapped ? pen[0] : pen[1];
            qualified  = ph_ > pa_ ? homeEs : awayEs;
          } else if (hasET) {
            const et  = match.score.et;
            const eth = swapped ? et[1] : et[0];
            const eta = swapped ? et[0] : et[1];
            qualified = eth > eta ? homeEs : awayEs;
          } else {
            qualified = h > a ? homeEs : awayEs;
          }

          patch[`results/${mid}`] = { home: h, away: a, penales: extras, qualified };
        }
        count++;
      }
    }

    if (!count) { toast("ℹ️ No hay resultados nuevos todavía"); return; }
    await fbUpdate("", patch);
    toast(`✅ ${count} resultado${count > 1 ? "s" : ""} sincronizado${count > 1 ? "s" : ""}`);
  } catch(e) {
    console.error(e);
    toast("❌ Error: " + e.message, false);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "🔄 Sincronizar resultados"; }
  }
}

// ── LOGIC ─────────────────────────────────────────────────────────────────────
function getMatchPhase(mid) {
  if (mid.startsWith("G"))   return 0;
  if (mid.startsWith("R32")) return 1;
  if (mid.startsWith("R16")) return 2;
  if (mid.startsWith("QF"))  return 3;
  if (mid.startsWith("SF"))  return 4;
  if (mid === "3RD")         return 5;
  if (mid === "FIN")         return 6;
  return 0;
}

// ── POINT RULES ──────────────────────────────────────────────────────────────
// Grupos (ph=0): apuesta marcador exacto → 3×mult; resultado (G/E/P) → 1×mult
// Eliminatorias (ph≥1): apuesta ganador (winner)
//   - Acertó ganador + partido terminó en 90' (no hubo penales) → 3×mult
//   - Acertó ganador + partido fue a penales (empate en 90')    → 2×mult
//   - Erró ganador → 0

function calcMatchPts(player, mid) {
  const res = S.results[mid]; if (!res) return null;
  const bet = S.bets[player]?.[mid]; if (!bet) return null;
  const mult = PHASES[getMatchPhase(mid)]?.mult || 1;
  const ph = getMatchPhase(mid);

  if (ph === 0) {
    // Grupos: marcador exacto o solo resultado
    const bh = parseInt(bet.home), ba = parseInt(bet.away);
    if (bh === res.home && ba === res.away) return 3 * mult;
    const rs = res.home > res.away ? "H" : res.home < res.away ? "A" : "D";
    const bs = bh > ba ? "H" : bh < ba ? "A" : "D";
    return rs === bs ? 1 * mult : 0;
  } else {
    // Eliminatorias
    if (!res.qualified) return 0;
    const wentToExtras = res.penales === true;

    if (!wentToExtras) {
      // Partido se definio en 90 min: ganador directo
      if (!bet.winner) return 0;
      return bet.winner === res.qualified ? 3 * mult : 0;
    } else {
      // Partido fue a prorroga/penales (empate en 90 min)
      // bet.winner90 = equipo ganador en 90 o "EMPATE"
      // bet.winner   = quien clasifica tras los extras
      let pts = 0;
      if (bet.winner90 === "EMPATE") pts += 2 * mult;   // acerto que habria empate
      if (bet.winner === res.qualified) pts += 1 * mult; // acerto quien clasifica
      return pts;
    }
  }
}

function calcPts(playerName) {
  let pts = 0;
  const pb = S.bets[playerName] || {};
  Object.entries(S.results).forEach(([mid, res]) => {
    const p = calcMatchPts(playerName, mid);
    if (p) pts += p;
  });
  return pts;
}

function getRanking() {
  return S.players.map(p => ({
    name: p.name,
    pts: calcPts(p.name),
    betsPlaced: Object.keys(S.bets[p.name] || {}).length,
  })).sort((a, b) => b.pts - a.pts || b.betsPlaced - a.betsPlaced);
}

function totalPot() { return S.players.length * S.fixedEntry; }

function getPhaseMatches(ph) {
  if (ph === 0) return GROUP_MATCHES;
  return Object.values(S.knockoutMatches).filter(m => m.phase === ph);
}

      const color = `hsl(${p.name.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%360},55%,45%)`;
      return `<div class="rank-row ${i === 0 ? "gold-row" : ""}">
        <span class="rank-pos">${MEDALS[i] || "#" + (i+1)}</span>
        <div class="rank-av" style="background:${color}">${p.name[0].toUpperCase()}</div>
        <div class="rank-info"><strong>${p.name}</strong><span class="rank-sub">${p.betsPlaced} pronósticos</span></div>
        <span class="rank-pts">${p.pts} pts</span>
      </div>`;
    }).join("")}

    <div class="legend">
      ${PHASES.map(p => `<span class="leg-item"><span style="width:7px;height:7px;border-radius:50%;background:${p.color};display:inline-block"></span>${p.short} ×${p.mult}</span>`).join("")}

    </div>
  </div>`;
}

// ── BIND EVENTS ───────────────────────────────────────────────────────────────
function bindAll() {
  // Nav
  document.querySelectorAll("[data-go]").forEach(el => {
    el.addEventListener("click", () => {
      const v = el.dataset.go;
      if ((v === "predict") && !S.player) { S.view = "login"; render(); return; }
      S.view = v; S.localBets = {}; S.localRes = {}; render();
    });
  });

  // Login
  document.querySelectorAll("[data-login]").forEach(el => {
    el.addEventListener("click", () => { S.player = el.dataset.login; S.view = "predict"; S.localBets = {}; render(); });
  });

  // Phase tabs
  document.querySelectorAll("[data-ph]").forEach(el => {
    el.addEventListener("click", () => { S.phase = parseInt(el.dataset.ph); render(); });
  });

  // Group tabs
  document.querySelectorAll("[data-grp]").forEach(el => {
    el.addEventListener("click", () => { S.group = el.dataset.grp; render(); });
  });

  // Bet inputs - score inputs (Grupos)
  document.querySelectorAll("[data-bid]").forEach(inp => {
    inp.addEventListener("input", () => {
      const mid = inp.dataset.bid, side = inp.dataset.side;
      const cur = S.localBets[mid] || S.bets[S.player]?.[mid] || { home: "", away: "" };
      S.localBets[mid] = { ...cur, [side]: inp.value };
    });
  });

  // Bet inputs - resultado 90 min (KO)
  document.querySelectorAll("[data-winner90]").forEach(inp => {
    inp.addEventListener("change", () => {
      const mid = inp.dataset.winner90;
      const cur = S.localBets[mid] || S.bets[S.player]?.[mid] || { winner90: "", winner: "" };
      S.localBets[mid] = { ...cur, winner90: inp.value, winner: inp.value !== "EMPATE" ? inp.value : (cur.winner || "") };
      render(); // re-render para mostrar/ocultar el segundo select
    });
  });

  // Bet inputs - quien clasifica tras extras (KO)
  document.querySelectorAll("[data-winner]").forEach(inp => {
    inp.addEventListener("change", () => {
      const mid = inp.dataset.winner;
      const cur = S.localBets[mid] || S.bets[S.player]?.[mid] || { winner: "" };
      S.localBets[mid] = { ...cur, winner: inp.value };
    });
  });

  // Save bets
  const sbBtn = document.getElementById("saveBetsBtn");
  if (sbBtn) sbBtn.addEventListener("click", async () => {
    const player = S.player;
    if (!player) return;
    const patch = {};
    Object.entries(S.localBets).forEach(([mid, bet]) => {
      const ph = getMatchPhase(mid);
      if (ph === 0) {
        // Grupos: necesita home y away
        if (bet.home !== "" && bet.away !== "") {
          patch[`bets/${player}/${mid}`] = { home: parseInt(bet.home), away: parseInt(bet.away) };
        }
      } else {
        // Eliminatorias: winner90 + winner
        if (bet.winner90) {
          const ko_bet = { winner90: bet.winner90 };
          if (bet.winner) ko_bet.winner = bet.winner;
          patch[`bets/${player}/${mid}`] = ko_bet;
        }
      }
    });
    if (Object.keys(patch).length === 0) return toast("No hay cambios para guardar", false);
    try {
      await fbUpdate("/", patch);
      S.localBets = {};
      toast(`✅ ${Object.keys(patch).length} pronósticos guardados`);
    } catch(e) { toast("❌ Error al guardar", false); }
  });

  // Result inputs
  document.querySelectorAll(
"[data-resqualified]"
).forEach(inp=>{

inp.addEventListener("change",()=>{

const mid=inp.dataset.resqualified;

const cur=
S.localRes[mid]
||S.results[mid]
||{home:"",away:""};

S.localRes[mid]={
   ...cur,
   qualified:inp.value
};

});

});

  // Score inputs para resultados (grupos y KO)
  document.querySelectorAll("[data-res]").forEach(inp => {
    inp.addEventListener("input", () => {
      const mid  = inp.dataset.res;
      const side = inp.dataset.side; // "home" o "away"
      const cur  = S.localRes[mid] || S.results[mid] || { home: "", away: "" };
      S.localRes[mid] = { ...cur, [side]: inp.value };
    });
  });

  // Penales checkbox
  document.querySelectorAll("[data-respenales]").forEach(chk => {
    chk.addEventListener("change", () => {
      const mid = chk.dataset.respenales;
      const cur = S.localRes[mid] || S.results[mid] || { home: "", away: "" };
      S.localRes[mid] = { ...cur, penales: chk.checked };
    });
  });

  // Save results
  document.querySelectorAll("[data-saveres]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const mid = btn.dataset.saveres;
      const lr = S.localRes[mid] || S.results[mid];
      const ph = getMatchPhase(mid);
      if (!lr || lr.home === "" || lr.away === "") return toast("⚠️ Ingresá ambos goles", false);
      if (ph > 0 && !lr.qualified) return toast("⚠️ Indicá qué equipo clasifica", false);
      try {
        const toSave = {
          home: parseInt(lr.home),
          away: parseInt(lr.away),
          qualified: lr.qualified || null
        };
        if (ph > 0) toSave.penales = lr.penales === true;
        await fbSet(`results/${mid}`, toSave);
        toast("✅ Resultado guardado — ranking actualizado");
      } catch(e) { toast("❌ Error al guardar", false); }
    });
  });

  // KO team inputs
  document.querySelectorAll("[data-ko]").forEach(inp => {
    inp.addEventListener("input", () => {
      const mid = inp.dataset.ko, side = inp.dataset.koside;
      const cur = S.localKO[mid] || { home: S.knockoutMatches[mid]?.home || "", away: S.knockoutMatches[mid]?.away || "" };
      S.localKO[mid] = { ...cur, [side]: inp.value };
    });
  });

  // Save KO teams
  document.querySelectorAll("[data-saveko]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const mid = btn.dataset.saveko;
      const ko = S.localKO[mid] || {};
      const home = ko.home || S.knockoutMatches[mid]?.home || "";
      const away = ko.away || S.knockoutMatches[mid]?.away || "";
      if (!home.trim() || !away.trim()) return toast("⚠️ Ingresá ambos equipos", false);
      try {
        await fbUpdate("/", {
          [`knockoutMatches/${mid}/home`]: home,
          [`knockoutMatches/${mid}/away`]: away,
        });
        toast("✅ Equipos guardados");
      } catch(e) { toast("❌ Error al guardar", false); }
    });
  });

  // Unlock / Lock phases
  document.querySelectorAll("[data-unlock]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const ph = parseInt(btn.dataset.unlock);
      const newList = [...new Set([...S.unlockedPhases, ph])];
      await fbSet("unlockedPhases", newList);
      toast(`🔓 ${PHASES[ph].name} habilitada`);
    });
  });
  document.querySelectorAll("[data-lock]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const ph = parseInt(btn.dataset.lock);
      if (ph === 0) return;
      if (!confirm(`¿Bloquear completamente ${PHASES[ph].name}? Los jugadores no podrán verla.`)) return;
      const newList = S.unlockedPhases.filter(p => p !== ph);
      await fbSet("unlockedPhases", newList);
      toast(`🔒 ${PHASES[ph].name} bloqueada`);
    });
  });

  // Cerrar / Reabrir pronósticos de una fase (fase visible pero sin poder editar apuestas)
  document.querySelectorAll("[data-closebets]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const ph = parseInt(btn.dataset.closebets);
      if (!confirm(`¿Cerrar pronósticos de ${PHASES[ph].name}? Los jugadores ya no podrán modificar sus apuestas.`)) return;
      const newList = [...new Set([...S.closedBets, ph])];
      await fbSet("closedBets", newList);
      toast(`🔐 Pronósticos de ${PHASES[ph].name} cerrados`);
    });
  });
  document.querySelectorAll("[data-openbets]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const ph = parseInt(btn.dataset.openbets);
      const newList = S.closedBets.filter(p => p !== ph);
      await fbSet("closedBets", newList);
      toast(`🔓 Pronósticos de ${PHASES[ph].name} reabiertos`);
    });
  });

  // Entry amount
  const seBtn = document.getElementById("saveEntryBtn");
  if (seBtn) seBtn.addEventListener("click", async () => {
    const v = parseFloat(document.getElementById("entryInp")?.value || 0);
    if (isNaN(v) || v <= 0) return toast("⚠️ Ingresá un monto válido", false);
    await fbSet("fixedEntry", v);
    toast(`✅ Entrada fijada en $${v.toLocaleString("es-AR")}`);
  });

  // Add player
  const apBtn = document.getElementById("addPlayerBtn");
  if (apBtn) apBtn.addEventListener("click", async () => {
    const name = document.getElementById("newNameInp")?.value.trim() || "";
    if (!name) return toast("⚠️ Ingresá un nombre", false);
    if (S.players.find(p => p.name === name)) return toast("⚠️ Ya existe ese nombre", false);
    const newPlayers = [...S.players, { name }];
    await fbSet("players", newPlayers);
    document.getElementById("newNameInp").value = "";
    toast(`✅ ${name} agregado`);
  });
  const newNameInp = document.getElementById("newNameInp");
  if (newNameInp) newNameInp.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("addPlayerBtn")?.click(); });

  // Remove player
  document.querySelectorAll("[data-rm]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const name = btn.dataset.rm;
      if (!confirm(`¿Eliminar a ${name}?`)) return;
      await fbSet("players", S.players.filter(p => p.name !== name));
      toast(`🗑️ ${name} eliminado`);
    });
  });

  // Admin login
  const alBtn = document.getElementById("adminLoginBtn");
  if (alBtn) alBtn.addEventListener("click", () => {
    const pw = document.getElementById("adminPwInp")?.value || "";
    if (pw === ADMIN_PW) { S.adminAuthed = true; render(); }
    else toast("❌ Contraseña incorrecta", false);
  });
  const adminPwInp = document.getElementById("adminPwInp");
  if (adminPwInp) adminPwInp.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("adminLoginBtn")?.click(); });

  // Admin logout
  const alOut = document.getElementById("adminLogout");
  if (alOut) alOut.addEventListener("click", () => { S.adminAuthed = false; render(); });

  const btnSync = document.getElementById("btn-sync");
  if (btnSync) btnSync.addEventListener("click", syncResults);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// Exponer en window para compatibilidad
window.syncResults = syncResults;

syncFirebase();
</script>
